name: Telegram Commands

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: matcha-restock-check
  cancel-in-progress: false

jobs:
  telegram-commands:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh branch before command polling
        run: git pull --ff-only origin main

      - name: Process Telegram commands
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python check_stock.py --mode commands

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          cp state.json "$RUNNER_TEMP/state.json"

          for attempt in 1 2 3; do
            echo "State push attempt $attempt"

            git fetch origin main
            git reset --hard origin/main
            cp "$RUNNER_TEMP/state.json" state.json

            git add state.json

            if git diff --cached --quiet; then
              echo "No state change to commit."
              exit 0
            fi

            git commit -m "Update Telegram command state"

            if git push origin HEAD:main; then
              echo "state.json pushed successfully."
              exit 0
            fi

            echo "Push failed because main moved. Retrying..."
            sleep 5
          done

          echo "Could not push state.json after 3 attempts."
          exit 1
